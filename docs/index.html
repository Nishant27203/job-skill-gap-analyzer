<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Job Skill Gap Analyzer</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
        background: radial-gradient(1200px 600px at 10% 10%, rgba(99,102,241,0.35), transparent 60%),
                    radial-gradient(1000px 600px at 90% 30%, rgba(34,197,94,0.25), transparent 55%),
                    linear-gradient(135deg, #0f172a 0%, #020617 100%);
        color: #e2e8f0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px;
      }
      .card {
        width: min(860px, 100%);
        border: 1px solid rgba(148,163,184,0.18);
        background: rgba(2, 6, 23, 0.35);
        border-radius: 18px;
        padding: 28px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.35);
      }
      h1 { margin: 0; font-size: 34px; letter-spacing: -0.02em; }
      p { margin: 10px 0 0; color: rgba(226,232,240,0.88); line-height: 1.55; }
      .btns { margin-top: 18px; display: flex; flex-wrap: wrap; gap: 12px; }
      a.btn {
        display: inline-block;
        text-decoration: none;
        padding: 10px 14px;
        border-radius: 12px;
        border: 1px solid rgba(148,163,184,0.22);
        background: rgba(15, 23, 42, 0.6);
        color: #e2e8f0;
        font-weight: 650;
      }
      a.btn.primary { background: rgba(99,102,241,0.85); border-color: rgba(99,102,241,0.9); }
      .meta { margin-top: 14px; font-size: 14px; color: rgba(148,163,184,1); }
      code { background: rgba(15,23,42,0.7); padding: 2px 6px; border-radius: 8px; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Job Skill Gap Analyzer</h1>
      <p>
        A web app that extracts skills from job descriptions, measures market demand,
        and compares it with candidate skills to highlight the skill gap.
      </p>
      <div class="btns">
        <a class="btn primary" href="https://job-skill-gap-analyzer-bcnhhwxboav4mewn75jbzl.streamlit.app/" target="_blank" rel="noreferrer">
          Open Live Demo
        </a>
        <a class="btn" href="https://github.com/Nishant27203/job-skill-gap-analyzer" target="_blank" rel="noreferrer">
          View Source on GitHub
        </a>
      </div>
      <div class="meta">
        Deploy note: this site is served by <code>GitHub Pages</code>. The live app runs on <code>Streamlit Cloud</code>.
      </div>
    </div>
  </body>
</html>
